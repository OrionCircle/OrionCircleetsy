<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OrionCircle — TikTok auth callback</title>
<style>
:root{--bg:#0d1024;--fg:#ece7dc;--dim:#8e93ad;--acc:#c9a24b;--line:#2a3157;--good:#5df2a0}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);line-height:1.6;
 font-family:"Iowan Old Style",Palatino,Georgia,serif;min-height:100vh;
 display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:640px;width:100%;background:rgba(10,14,34,.7);border:1px solid var(--line);
 border-radius:10px;padding:32px}
h1{font-size:24px;margin:0 0 6px}
p{color:var(--dim);margin:0 0 20px}
.code{font-family:ui-monospace,monospace;font-size:15px;word-break:break-all;background:#060a18;
 border:1px solid var(--line);border-radius:8px;padding:16px;color:var(--good);margin:0 0 16px}
button{font:600 15px sans-serif;background:var(--acc);color:#1a1400;border:0;border-radius:8px;
 padding:12px 18px;cursor:pointer}
.hint{font-size:14px;color:var(--dim);margin-top:18px}
.err{color:#ff6b7d}
</style>
</head>
<body>
<div class="card">
<h1>TikTok authorisation</h1>
<p id="lead">Reading the code TikTok sent back…</p>
<div class="code" id="code">—</div>
<button id="copy">Copy code</button>
<p class="hint">Paste this into the server terminal:<br>
<code style="color:var(--acc)">tiktok-agent.py --code "&lt;paste&gt;"</code></p>
</div>
<script>
(function(){
 var p=new URLSearchParams(location.search);
 var code=p.get("code"), err=p.get("error")||p.get("error_description");
 var lead=document.getElementById("lead"), box=document.getElementById("code");
 if(code){
  lead.textContent="Success — here is your authorisation code:";
  box.textContent=code;
  document.getElementById("copy").onclick=function(){
   navigator.clipboard.writeText(code).then(function(){this.textContent="Copied ✓";}.bind(this));
  };
 }else{
  lead.className="err";
  lead.textContent=err?("TikTok returned an error: "+err):"No code in the URL. Start again from tiktok-agent.py --auth.";
  box.style.display="none";document.getElementById("copy").style.display="none";
 }
})();
</script>
</body>
</html>
